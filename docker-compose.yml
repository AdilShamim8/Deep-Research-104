version: "3.9"

services:

  # ── Main API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-duckduckgo}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.cache:/app/.cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deep_research_net
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deep_research_net

  # ── Ollama (Local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - deep_research_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - local  # Only start with: docker-compose --profile local up

  # ── Model puller (one-shot setup) ─────────────────────────────────────────
  model-puller:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "
        sleep 5 &&
        curl -X POST http://ollama:11434/api/pull
        -d '{\"name\": \"deepseek-r1:7b\"}'
      "
    networks:
      - deep_research_net
    profiles:
      - local

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - deep_research_net
    profiles:
      - monitoring

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - deep_research_net
    profiles:
      - monitoring


volumes:
  redis_data:
  ollama_models:
  prometheus_data:
  grafana_data:


networks:
  deep_research_net:
    driver: bridge